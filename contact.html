    <main class="page-main"><section class="contact-section page-contact reveal" id="contact"><div class="contact-copy"><p class="eyebrow">Contact</p><h1>想动起来，就从一次咨询开始</h1><p>留下你的信息，我们会按年龄、时间和想参加的项目帮你匹配活动。也可以直接添加微信：18902543881。</p><button class="wechat-copy" type="button" data-copy="18902543881">复制微信号</button></div><form class="contact-form" id="consultForm"><label>姓名<input name="name" type="text" placeholder="请输入姓名" required /></label><label>联系方式<input name="phone" type="tel" placeholder="手机号或微信号" required /></label><label>想参加的项目<select name="sport" required><option value="">请选择</option><option>健身</option><option>篮球</option><option>足球</option><option>跑步</option><option>拳击</option><option>羽毛球</option><option>团体活动</option></select></label><label>你的时间<textarea name="message" rows="4" placeholder="例如：工作日晚上、周末下午、青少年周末班"></textarea></label><button class="button primary full" type="submit">提交咨询</button><p class="form-status" role="status" aria-live="polite"></p></form></section><section class="section reveal"><div class="section-heading"><p class="eyebrow">FAQ</p><h2>常见问题</h2></div><div class="faq-grid"><article class="faq-card"><strong>没有基础可以参加吗？</strong><p>可以。活动会按新人、进阶、挑战分组，先从合适强度开始。</p></article><article class="faq-card"><strong>可以带朋友一起吗？</strong><p>可以，报名时在留言里写人数和项目，我们会一起安排。</p></article><article class="faq-card"><strong>青少年和上班族会混在一起吗？</strong><p>不会强行混组。我们会按年龄、体能、时间和活动类型安排。</p></article></div></section></main>
